<div class="auth-wrapper">
  <div class="auth-form-panel">
    <div class="auth-form-inner">
      <h1 class="fw-bold h2 mb-1">Reset Password</h1>
      <p class="text-muted mb-4">Enter a new password (minimum 10 characters).</p>

      @if (error()) {
        <div class="alert alert-danger rounded-3 py-2 small">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">New password</label>
          <div class="input-group">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              class="form-control form-control-lg auth-input"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              required
            />
            <button
              type="button"
              class="btn btn-outline-secondary"
              (click)="toggleShowPassword()"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            >
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 10 7 10 7a16.46 16.46 0 0 1-4.19 5.36M6.1 6.1A16.2 16.2 0 0 0 2 12s3 7 10 7a10.8 10.8 0 0 0 3-.42" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
              }
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Confirm password</label>
          <div class="input-group">
            <input
              [type]="showConfirmPassword() ? 'text' : 'password'"
              class="form-control form-control-lg auth-input"
              [ngModel]="confirmPassword()"
              (ngModelChange)="confirmPassword.set($event)"
              name="confirmPassword"
              required
            />
            <button
              type="button"
              class="btn btn-outline-secondary"
              (click)="toggleShowConfirmPassword()"
              [attr.aria-label]="showConfirmPassword() ? 'Hide password' : 'Show password'"
            >
              @if (showConfirmPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 10 7 10 7a16.46 16.46 0 0 1-4.19 5.36M6.1 6.1A16.2 16.2 0 0 0 2 12s3 7 10 7a10.8 10.8 0 0 0 3-.42" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
              }
            </button>
          </div>
        </div>
        @if (password() && confirmPassword() && password() !== confirmPassword()) {
          <div class="form-text text-danger mb-2">Passwords do not match.</div>
        }

        <button type="submit" class="btn auth-btn btn-lg w-100" [disabled]="loading() || isInvalid">
          @if (loading()) {
            Resetting…
          } @else {
            Update Password
          }
        </button>
      </form>

      <p class="text-muted mt-3">
        <a routerLink="/login" class="text-primary fw-semibold text-decoration-none">Back to login</a>
      </p>
    </div>
  </div>
</div>
