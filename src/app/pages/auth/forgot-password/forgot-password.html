<div class="auth-wrapper">
  <div class="auth-form-panel">
    <div class="auth-form-inner">
      <h1 class="fw-bold h2 mb-1">Forgot Password</h1>
      <p class="text-muted mb-4">Enter your account email to receive a reset link.</p>

      @if (error()) {
        <div class="alert alert-danger rounded-3 py-2 small">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <input
            type="email"
            class="form-control form-control-lg auth-input"
            placeholder="you@example.com"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            required
          />
        </div>

        <button type="submit" class="btn auth-btn btn-lg w-100" [disabled]="loading() || !email().trim()">
          @if (loading()) {
            Requesting…
          } @else {
            Send Reset Link
          }
        </button>
      </form>

      <p class="text-muted mt-3">
        <a routerLink="/login" class="text-primary fw-semibold text-decoration-none">Back to login</a>
      </p>
    </div>
  </div>
</div>
